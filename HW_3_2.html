<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body bgcolor="#DfCf3f">
    <h1 align="center">Student Registration Form</h1>
    <form>
        <label>Full Name <input type="text" name="name"></label><br><br>
        <label>Student Name <input type="text" name="std_name"></label><br><br>
        <label>Fathers Name <input type="text" name="f_name"></label><br><br>
        <label>Date of Birth<input type="date" name="date"></label><br><br>
        <label>Mobile No<input type="Number" name="m_no" pattern="[0-9]{10}"></label><br><br>
        <label>E-mail id<input type="email" name="email"></label><br><br>
        <label>Password <input type="password" name="Password" ></label><br><br>
        <label>Gender <input type="radio" name="option">Male<input type="radio" name="option">Female</label><br><br>
        <label>Department <input type="checkbox" name="option1">CSE<input type="checkbox" name="option1">IT<input type="checkbox" name="option1">ECE<input type="checkbox" name="option1">Civil<input type="checkbox" name="option1">Mech</label><br><br>
        <label>Cource </label><select>
            <option value="1">Cource1</option>
            <option value="2">Cource2</option>
            <option value="3">Cource3</option>
            </select><br><br>

        <label>Student Photo <input type="image" name="std_img"></label><br><br>
        <label>City <input type="text" name="city_name"></label><br><br>
        <label>Address <input type="text" name="address"></label><br><br>

    <label><button type="submit" ">Register</button>
    </form>

</body>
</html>
