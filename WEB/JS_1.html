<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .section {
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #96c7bc;
        }
        .container{
            margin: auto;
            padding: 20px;
            max-width: 600px;
            border: 1px solid rgb(197, 195, 195);
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0, 0.5);
        }
        
        h1{
            text-align: center;
        }

    </style>
</head>

<body class="bg-light">

    <div class="container my-5">
        <h1 class="text-center mb4">JAVA SCRIPT</h1>
        
        <div class="section bg-white">
            <h3>1.Even Odd</h3>
            <script>
                let a3 = 23;

                if (a3%2===0 ) {
                    document.write(" Even");

                }

                else {
                    document.write("Odd");

                }
            </script>
        </div>
        
        <div class="section bg-white">
            <h3>2. Positive Negative</h3>
            <script>
                let a4 = 23;

                if (a4>=0) {
                    document.write("a is positive");

                }

                else {
                    document.write("a is negative");

                }
            </script>
        </div>
        <div class="section bg-white">
            <h3>3.Variables</h3>
            <script>
                let a = 12;
                let b = 23;
                let c = a + b;

                document.write("Answer is : " + c);
                alert("SUM  : " +c);

            </script>
        </div>
        <div class="section bg-white">
            <h3>4.Conditional Statements</h3>
            <script>
                let a2 = 23, b2 = 20;
                document.write("a = " + a2 + "<br>");
                document.write("b = " + b2 + "<br>");


                if (a2 > b2) {
                    document.write("a is greater than b");

                }

                else {
                    document.write("b is greater than a");

                }
            </script>
        </div>
    </div>

</body>

</html>
