<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;


        }

        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .form-group-inline {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-group-inline label {
            margin: 0;
            font-weight: normal;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 6px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #5a45a0;
        }
    </style>
</head>

<body>
    <form class="form-container">
        <h1>Registration Form</h1>
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="number" name="number" pattern="[0-9]{5}[0-9]{5}" required>

        <label for="dob">Date Of Birth:</label>
        <input type="date" id="dob" name="dob" required>

        <label for="gender">Gender:</label>
        <div class="form-group-inline">
            <label><input type="radio" id="gender" name="gender">Male</label>
            <label><input type="radio" id="gender" name="gender">Female</label>
            <label><input type="radio" id="gender" name="gender">Other</label>
        </div>

        <label for="skills">Skills:</label>
        <div class="form-group-inline">
            <label><input type="checkbox" id="option1" name="HTML">HTML</label>
            <label><input type="checkbox" id="option2" name="CSS">CSS</label>
            <label><input type="checkbox" id="option3" name="JAVA">JAVA</label>
            <label><input type="checkbox" id="option4" name="PYTHON">PYTHON</label>
        </div>
        <label for="contry">Contry</label>
        <select>
            <option value>----Select----</option>
            <option value="ind">India</option>
            <option value="uk">UK</option>
            <option value="usa">USA</option>
        </select>

        <label for="message">Your Message</label>
        <textarea name="message" id="message"></textarea>

        <button type="submit">Submit</button>
    </form>
</body>

</html>
