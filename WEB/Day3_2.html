<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Textual Inputs</legend>
        <label>Text: <input type="text" name="text" placeholder="Single-Line text"></label><br><br>
        <label>Password: <input type="text" name="password" placeholder="Password"></label><br><br>
        <label>Email: <input type="email" name="email" placeholder="example@example.com"></label><br><br>
        <label>Search: <input type="text" name="text" placeholder="Search..."></label><br><br>
        <label>Telephone: <input type="number" name="telephone" placeholder="+91 9876543210"></label><br><br>
        <label>URL: <input type="url" name="url" placeholder="https://example.com"></label><br><br>

    </fieldset>
    
    <fieldset>
        <legend>Numeric & Range</legend>
        <label>Number: <input type="number" name="text" min="0" max="10"></label><br><br>
        <label>Range: <input type="range" name="range" min="0" max="10"></label><br><br>
    </fieldset>
     <fieldset>
        <legend>Date & Time</legend>
        <label>Date: <input type="Date" name="Date"></label><br><br>
        <label>Month: <input type="month" name="month" ></label><br><br>
        <label>Week: <input type="week" name="week" ></label><br><br>
        <label>Time: <input type="time" name="time" ></label><br><br>
        <label>Date-time-loacl: <input type="datetime-local" name="Datetime" ></label><br><br>

    </fieldset>

    <fieldset>
        <legend>Choice Inputs </legend>
        <label><input type="checkbox" name="Checkbox" value="yes"> Checkbox(one)</label><br><br>
        <label>Radio Group(check one) <br><input type="radio" name="radio" value="option1" >Option1</label><br>
        <label><input type="radio" name="radio" value="option2" ></label>Option2<br>
        <label><input type="radio" name="radio" value="option3" ></label>Option3<br>
        <label>Color: <input type="color" name="color" ></label><br><br>

    </fieldset>
   <fieldset>
      <legend>File, Hidden &amp; Buttons</legend>
      <label>File: <input type="file" name="example_file"></label><br><br>
      <input type="hidden" name="example_hidden" value="hidden-value-123">
      <p>Buttons:</p>
      <input type="submit" value="Submit Form">
      <input type="reset" value="Reset Form">
      <input type="button" value="Plain Button">
      <input type="image" src="" alt="img-button" width="50" height="50">
    </fieldset>
</body>
</html>
