<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3 align="center">Rowspan</h3>
    <table align="center" border="2" cellpadding="5" cellspacing="5">
        <tr bgcolor="#ff456f">
            <th>Day</th>
            <th>Subject</th>

        </tr>
        <tr>
            <td rowspan="2">Monday</td>
            <td>Mathematics</td>

        </tr>
        <tr>
            <td>Science</td>
        </tr>

    </table>
    <h3 align="center"> colspan</h3>
    <table align="center" border="5" cellpadding="5" cellspacing="5">
        <tr bgcolor="#ff456f">
            <th colspan="4">Subject</th>
        </tr>
        <tr>
            <td>Mathematics</td>
            <td>Hindi</td>
            <td>English</td>
            <td>Science</td>
        </tr>
        </table>
</body>

</html>
