<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body bgcolor="#a8dab5">
    <form>
        <h2 align="center">Job Application Form</h2>
        <fieldset>
            <legend>Personal Details</legend>
            <label>
                First Name: <input type="text" name="first_name" placeholder="First Name">
                Middle Name: <input type="text" name="middle_name" placeholder="Middle Name">
                Last Name: <input type="text" name="last_name" placeholder="Last Name">

            </label><br><br>
            <label>
                Gender:
                <input type="radio" name="gender" value="Male">Male
                <input type="radio" name="gender" value="Female">Female

            </label><br><br>

            <label>
                Phone no:
                <input type="tel" name="phone" placeholder="Phone Number">
            </label>
            <br><br>
            <label>
                Address:
                <input type="text" name="address" placeholder="Address">

            </label>
        </fieldset>
        <fieldset>
            <legend>Educational Details</legend>
            <table border="1">
                <tr>
                    <th>Class</th>
                    <th>Board/University</th>
                    <th>Year of Passing</th>
                    <th>Division</th>
                </tr>
                <tr>
                    <td>10th</td>
                    <td><input type="text" name="board_10" placeholder="Board"></td>
                    <td><input type="text" name="year_10" placeholder="Year of Passing"></td>
                    <td><input type="text" name="division_10" placeholder="Division"></td>
                </tr>
                <tr>
                    <td>12th</td>
                    <td><input type="text" name="board_12" placeholder="Board"></td>
                    <td><input type="text" name="year_12" placeholder="Year of Passing"></td>
                    <td><input type="text" name="division_12" placeholder="Division"></td>
                </tr>
                <tr>
                    <td>Graduation</td>
                    <td><input type="text" name="board_grad" placeholder="University"></td>
                    <td><input type="text" name="year_grad" placeholder="Year of Passing"></td>
                    <td><input type="text" name="division_grad" placeholder="Division"></td>
                </tr>
                <tr>
                    <td>Others</td>
                    <td><input type="text" name="board_others" placeholder="Board"></td>
                    <td><input type="text" name="year_others" placeholder="Year of Passing"></td>
                    <td><input type="text" name="division_others" placeholder="Division"></td>
                </tr>
            </table>
        </fieldset>
        <label>
            Years Of experience: <h4>69 Months of Experience of teaching field</h4>
        </label>
        <label>
            <input type="submit" value="Submit">
        </label>
    </form>
</body>

</html>
